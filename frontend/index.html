<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>AI Kalkulátor</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>

</head>
<body>

<div class="calculator-container">

    <div id="ai-container">
        <input id="ai-input" placeholder="Írj valamit...">
        <button id="ai-send">AI</button>
    </div>

    <div class="calculator">
        <div class="display">0</div>

        <div class="buttons">
            <button class="btn operator" id="clear" data-type="clear">AC</button>
            <button class="btn operator" data-type="operator" data-value="/">÷</button>
            <button class="btn operator" data-type="operator" data-value="*">×</button>
            <button class="btn operator" data-type="operator" data-value="-">−</button>

            <button class="btn" data-type="number" data-value="7">7</button>
            <button class="btn" data-type="number" data-value="8">8</button>
            <button class="btn" data-type="number" data-value="9">9</button>
            <button class="btn operator" data-type="operator" data-value="+">+</button>

            <button class="btn" data-type="number" data-value="4">4</button>
            <button class="btn" data-type="number" data-value="5">5</button>
            <button class="btn" data-type="number" data-value="6">6</button>

            <button class="btn" data-type="number" data-value="1">1</button>
            <button class="btn" data-type="number" data-value="2">2</button>
            <button class="btn" data-type="number" data-value="3">3</button>

            <button class="btn equals" data-type="equals">=</button>
            <button class="btn" data-type="number" data-value="0">0</button>
            <button class="btn" data-type="decimal">.</button>
        </div>
    </div>
    <div class="backend-selector">
        <label><input type="radio" name="backend" value="5000" checked> Python (5000)</label>
        <label><input type="radio" name="backend" value="5001"> Rust (5001)</label>
    </div>
</div>
</div>

</body>
</html>
